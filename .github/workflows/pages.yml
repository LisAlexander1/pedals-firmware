name: Deploy firmware to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy firmware site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e micro

      - name: Prepare _site/
        env:
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          mkdir -p _site

          # Артефакты прошивки в корень сайта
          cp .pio/build/micro/firmware.hex _site/firmware.hex
          cp .pio/build/micro/firmware.elf _site/firmware.elf

          # Версия из тега; если запуск ручной — собираем псевдоверсию из SHA
          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"
          else
            TAG="dev-${SHA::7}"
          fi

          SIZE=$(stat -c%s .pio/build/micro/firmware.hex)
          PUBLISHED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES=$(git log -1 --pretty=%B)

          # Генерируем manifest.json — JSON-индекс для webapp
          jq -n \
            --arg tag        "$TAG" \
            --arg name       "$TAG" \
            --arg published  "$PUBLISHED" \
            --argjson size   "$SIZE" \
            --arg commit     "$SHA" \
            --arg notes      "$NOTES" \
            --arg htmlUrl    "https://github.com/${REPO}/releases/tag/${TAG}" \
            '{
               tag: $tag,
               name: $name,
               publishedAt: $published,
               size: $size,
               hex: "firmware.hex",
               elf: "firmware.elf",
               commit: $commit,
               notes: $notes,
               htmlUrl: $htmlUrl
             }' > _site/manifest.json

          cat _site/manifest.json

          # Лендинг
          cat > _site/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Pedals Firmware — ${TAG}</title>
            <style>
              :root { --bg:#0e0f12; --elev:#181a1f; --elev2:#21242b; --border:#2a2e36;
                      --text:#e6e8ec; --dim:#8a8f99; --accent:#ff8c1a; }
              * { box-sizing: border-box; }
              body { margin:0; padding:40px 20px; background:var(--bg); color:var(--text);
                     font:15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
                     min-height:100vh; }
              .card { max-width:640px; margin:0 auto; background:var(--elev);
                      border:1px solid var(--border); border-radius:12px;
                      padding:28px 32px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
              h1 { margin:0 0 4px; font-size:22px; color:var(--accent);
                   text-transform:uppercase; letter-spacing:.5px; }
              .subtitle { color:var(--dim); font-size:13px; margin-bottom:20px; }
              .meta { display:grid; grid-template-columns:120px 1fr; gap:6px 14px;
                      padding:14px 16px; background:var(--elev2);
                      border:1px solid var(--border); border-radius:8px;
                      font-variant-numeric:tabular-nums; font-size:13px; }
              .meta .k { color:var(--dim); }
              .meta .v { color:var(--text); word-break:break-all; }
              .actions { display:flex; gap:10px; flex-wrap:wrap; margin:20px 0; }
              a.btn { display:inline-flex; align-items:center; gap:6px;
                      padding:10px 18px; border-radius:6px; text-decoration:none;
                      font-weight:600; font-size:13px; }
              a.btn.primary { background:var(--accent); color:#1a0e00; }
              a.btn.primary:hover { background:#ffa64d; }
              a.btn.ghost { background:var(--elev2); color:var(--text);
                            border:1px solid var(--border); }
              a.btn.ghost:hover { border-color:var(--accent); color:var(--accent); }
              pre.notes { background:var(--bg); border:1px solid var(--border);
                          border-radius:6px; padding:12px 14px; color:var(--dim);
                          font-size:12px; max-height:280px; overflow-y:auto;
                          white-space:pre-wrap; margin:20px 0 0; }
              .hint { color:var(--dim); font-size:12px; margin-top:24px;
                      padding-top:16px; border-top:1px solid var(--border); }
              .hint code { background:var(--elev2); padding:2px 6px; border-radius:3px;
                           color:var(--accent); }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>▣ Pedals Firmware</h1>
              <div class="subtitle">Latest build for Arduino Pro Micro (ATmega32U4)</div>

              <div class="meta">
                <span class="k">Version</span> <span class="v">${TAG}</span>
                <span class="k">Published</span> <span class="v">${PUBLISHED}</span>
                <span class="k">Size</span> <span class="v">${SIZE} bytes</span>
                <span class="k">Commit</span> <span class="v">${SHA}</span>
              </div>

              <div class="actions">
                <a class="btn primary" href="firmware.hex" download>Download firmware.hex</a>
                <a class="btn ghost" href="manifest.json">manifest.json</a>
                <a class="btn ghost" href="https://github.com/${REPO}/releases/tag/${TAG}">Release on GitHub</a>
              </div>

              <pre class="notes">${NOTES}</pre>

              <div class="hint">
                Use the configurator at
                <code>https://lisalexander1.github.io/pedals-webapp/</code>
                — it will pick up this build automatically and flash your board over USB.
              </div>
            </div>
          </body>
          </html>
          HTML

          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
