; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:micro]
platform = atmelavr
board = micro
framework = arduino
monitor_speed = 115200
lib_deps =
    robtillaart/HX711 @ ^0.5
    https://github.com/MHeironimus/ArduinoJoystickLibrary.git
build_flags =
    ; --- Распиновка ---
    -DPIN_THROTTLE=A0
    -DPIN_CLUTCH=A1
    -DPIN_HX711_DT=4
    -DPIN_HX711_SCK=5
    ; --- Serial ---
    -DSERIAL_BAUD=115200
    -DSERIAL_TIMEOUT_MS=50
    ; --- HID-джойстик ---
    -DAXIS_OUT_MIN=0
    -DAXIS_OUT_MAX=1023
    ; --- HX711 ---
    -DHX711_GAIN=128
    ; --- Стрим состояния по Serial ---
    -DSTREAM_DEFAULT_PERIOD_MS=20
    -DSTREAM_MIN_PERIOD_MS=5
    -DSTREAM_MAX_PERIOD_MS=1000
    ; --- Калибровка / EEPROM ---
    -DCALIB_EEPROM_ADDR=0
    -DCALIB_MAGIC_VAL=0xC0FFEE02UL
    -DCALIB_VERSION_VAL=1
    -DCURVE_POINTS_N=6
    -DSMA_MAX_WINDOW_N=32
    ; --- Дефолтные значения осей ---
    -DDEFAULT_HALL_RAW_MIN=0
    -DDEFAULT_HALL_RAW_MAX=1023
    -DDEFAULT_BRAKE_RAW_MIN=0
    -DDEFAULT_BRAKE_RAW_MAX=200000
    -DDEFAULT_DEADZONE_LOW=10
    -DDEFAULT_DEADZONE_HIGH=10
    -DDEFAULT_FILTER_TYPE=FILTER_EMA
    -DDEFAULT_FILTER_STRENGTH=96
    ; --- Ограничения протокола ---
    -DDEADZONE_MAX=511
